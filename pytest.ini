[pytest]
# Test discovery
pythonpath = src
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --timeout=300
    --timeout-method=thread
    --cov=blinter
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90.0
    --cov-branch
    --cov-config=.coveragerc
    --cov-context=test
    --durations=10
    --maxfail=1
    --no-cov-on-fail
#    -n logical

# Output options
console_output_style = progress
junit_family = xunit2
junit_logging = all
log_level = INFO
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s (%(filename)s:%(lineno)d)
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filters and warnings
filterwarnings =
    error
    ignore::DeprecationWarning:.*
    ignore::PendingDeprecationWarning:.*
    # Ignore encoding warnings during testing - these are expected when testing various encodings
    ignore:File.*was read using.*encoding instead of UTF-8.*:UserWarning:blinter

# Minimum version requirements
minversion = 8.0

# Cache
cache_dir = .pytest_cache
